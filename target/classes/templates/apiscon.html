<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consumo de APIs - APICONS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h2 class="mb-4">Consumo de APIs Gratuitas</h2>

    <div class="mb-3">
        <label class="form-label">Selecciona una API</label>
        <select id="apiSelect" class="form-select">
            <option value="">-- Seleccione --</option>
            <option value="open-meteo">Open-Meteo (Clima)</option>
            <option value="rest-countries">REST Countries</option>
            <option value="jsonplaceholder">JSONPlaceholder</option>
            <option value="nager-date">Nager.Date (Feriados Chile)</option>
            <option value="dog-ceo">Dog CEO</option>
        </select>
    </div>

    <button id="btnGuardar" class="btn btn-success" disabled>Guardar consumo API</button>
    <span id="timer" class="ms-3 text-muted"></span>

    <div class="mt-4">
        <table class="table table-bordered">
            <tr>
                <td id="mensajeError" class="text-danger">Aquí aparecerán los mensajes de error o éxito</td>
            </tr>
        </table>
    </div>

    <a href="/" class="btn btn-outline-secondary mt-3">Volver al inicio</a>
</div>

<script>
    // Aquí irá el JavaScript del timer de 1 minuto y la llamada al backend
</script>
</body>
</html>
